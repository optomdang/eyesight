services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: eyesight
      POSTGRES_PASSWORD: eyesight
      POSTGRES_DB: eyesight_local
    ports:
      - '5433:5432'
    volumes:
      - eyesight_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U eyesight -d eyesight_local']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  eyesight_postgres_data:
